volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  cinescope-net:
    driver: bridge

# ─── Shared dev service definition ───────────────────────────────────────────
# Every application container is built from the same lightweight dev image and
# bind-mounts the whole repository at /workspace. Node resolves dependencies
# from the single hoisted node_modules created by the `deps` service, which
# lives on the host (bind mount) so VS Code can see every installed package
# without anything being installed on the host machine.
x-node-dev: &node-dev
  build:
    context: .
    dockerfile: Dockerfile.dev
  image: cinescope-dev:latest
  volumes:
    - .:/workspace
  networks:
    - cinescope-net

services:
  # ─── Dependencies installer ────────────────────────────────────────────────
  # Runs `npm install` once for the whole workspace before the services start.
  # Because the repo is bind-mounted, the resulting node_modules appears on the
  # host and is shared by all services (and read by the VS Code TS server).
  deps:
    <<: *node-dev
    container_name: cinescope-deps
    command: npm install
    restart: "no"

  # ─── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cinescope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cinescope_secret}
      POSTGRES_DB: ${POSTGRES_DB:-cinescope}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cinescope-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cinescope} -d ${POSTGRES_DB:-cinescope}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:alpine
    container_name: redis
    volumes:
      - redis_data:/data
    networks:
      - cinescope-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  rabbitmq:
    image: rabbitmq:management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-cinescope}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-cinescope_secret}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "15672:15672"
    networks:
      - cinescope-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Application Services ──────────────────────────────────────────────────

  auth-service:
    <<: *node-dev
    container_name: auth-service
    working_dir: /workspace/auth-service
    command: npm run dev
    ports:
      - "4001:4001"
    environment:
      NODE_ENV: development
      PORT: 4001
      DATABASE_URL: postgresql://${POSTGRES_USER:-cinescope}:${POSTGRES_PASSWORD:-cinescope_secret}@postgres:5432/${POSTGRES_DB:-cinescope}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-cinescope}:${RABBITMQ_PASSWORD:-cinescope_secret}@rabbitmq:5672
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  catalog-service:
    <<: *node-dev
    container_name: catalog-service
    working_dir: /workspace/catalog-service
    command: npm run dev
    ports:
      - "4002:4002"
    environment:
      NODE_ENV: development
      PORT: 4002
      DATABASE_URL: postgresql://${POSTGRES_USER:-cinescope}:${POSTGRES_PASSWORD:-cinescope_secret}@postgres:5432/${POSTGRES_DB:-cinescope}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-cinescope}:${RABBITMQ_PASSWORD:-cinescope_secret}@rabbitmq:5672
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  recomendation-service:
    <<: *node-dev
    container_name: recomendation-service
    working_dir: /workspace/recomendation-service
    command: npm run dev
    ports:
      - "4003:4003"
    environment:
      NODE_ENV: development
      PORT: 4003
      DATABASE_URL: postgresql://${POSTGRES_USER:-cinescope}:${POSTGRES_PASSWORD:-cinescope_secret}@postgres:5432/${POSTGRES_DB:-cinescope}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-cinescope}:${RABBITMQ_PASSWORD:-cinescope_secret}@rabbitmq:5672
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  review-service:
    <<: *node-dev
    container_name: review-service
    working_dir: /workspace/review-service
    command: npm run dev
    ports:
      - "4004:4004"
    environment:
      NODE_ENV: development
      PORT: 4004
      DATABASE_URL: postgresql://${POSTGRES_USER:-cinescope}:${POSTGRES_PASSWORD:-cinescope_secret}@postgres:5432/${POSTGRES_DB:-cinescope}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-cinescope}:${RABBITMQ_PASSWORD:-cinescope_secret}@rabbitmq:5672
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  watchlist-service:
    <<: *node-dev
    container_name: watchlist-service
    working_dir: /workspace/watchlist-service
    command: npm run dev
    ports:
      - "4005:4005"
    environment:
      NODE_ENV: development
      PORT: 4005
      DATABASE_URL: postgresql://${POSTGRES_USER:-cinescope}:${POSTGRES_PASSWORD:-cinescope_secret}@postgres:5432/${POSTGRES_DB:-cinescope}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-cinescope}:${RABBITMQ_PASSWORD:-cinescope_secret}@rabbitmq:5672
    depends_on:
      deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  gateway-service:
    <<: *node-dev
    container_name: gateway-service
    working_dir: /workspace/gateway-service
    command: npm run dev
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      AUTH_SERVICE_URL: http://auth-service:4001
      CATALOG_SERVICE_URL: http://catalog-service:4002
      RECOMENDATION_SERVICE_URL: http://recomendation-service:4003
      REVIEW_SERVICE_URL: http://review-service:4004
      WATCHLIST_SERVICE_URL: http://watchlist-service:4005
    depends_on:
      deps:
        condition: service_completed_successfully
      auth-service:
        condition: service_started
      catalog-service:
        condition: service_started
      recomendation-service:
        condition: service_started
      review-service:
        condition: service_started
      watchlist-service:
        condition: service_started
